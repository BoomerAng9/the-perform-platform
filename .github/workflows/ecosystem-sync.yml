name: Ecosystem Sync
on:
  push:
    paths: ['ecosystem.node.json']
    branches: [main]
jobs:
  notify-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: manifest
        run: |
          echo "node_id=$(jq -r '.nodeId' ecosystem.node.json)" >> $GITHUB_OUTPUT
          echo "role=$(jq -r '.role' ecosystem.node.json)" >> $GITHUB_OUTPUT
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ECOSYSTEM_TOKEN }}
          repository: BoomerAng9/AIMS
          event-type: ecosystem-node-updated
          client-payload: '{"nodeId":"${{ steps.manifest.outputs.node_id }}","role":"${{ steps.manifest.outputs.role }}","repo":"${{ github.repository }}","sha":"${{ github.sha }}"}'
